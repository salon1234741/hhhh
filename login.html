<!DOCTYPE html>
<html class="dark" lang="id"><head>
<meta charset="utf-8"/>

<title>Login SmartKos</title>

                        "on-primary": "#472a00",

                        "secondary-container": "#00a6e0",

                        "inverse-on-surface": "#283044",
                        "surface-container-low": "#131b2e",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
        }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-48 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[160px]"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-md px-8 py-12 z-10">
<!-- Brand Header -->
<header class="mb-16 flex flex-col items-start">
<div class="mb-8 w-16 h-16 bg-gradient-to-tr from-primary to-primary-container rounded-lg flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<h1 class="text-display-lg text-4xl font-extrabold tracking-tighter text-on-surface mb-2">
                Halaman Login
            </h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm opacity-80 uppercase">
                Selamat Datang Di Website Ropiul
            </p>
</header>
<!-- Form Section -->
<form class="space-y-8" id="loginForm">
<!-- Email Field -->
<div class="space-y-3">
<label class="text-xs font-bold tracking-[0.2em] text-on-surface-variant uppercase ml-1">Email Address</label>
<div class="relative flex items-center">
<div class="absolute left-5 text-on-surface-variant pointer-events-none">
<span class="material-symbols-outlined text-xl">alternate_email</span>
</div>
<input id="email" class="w-full bg-surface-container-low border-none rounded-xl py-5 pl-14 pr-6 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 focus:bg-surface-container transition-all duration-300" placeholder="name@example.com" type="email" required/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-3">
<div class="flex justify-between items-end px-1">
<label class="text-xs font-bold tracking-[0.2em] text-on-surface-variant uppercase">PASSWORD</label>
</div>
<div class="relative flex items-center">
<div class="absolute left-5 text-on-surface-variant pointer-events-none">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input id="password" class="w-full bg-surface-container-low border-none rounded-xl py-5 pl-14 pr-14 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 focus:bg-surface-container transition-all duration-300" placeholder="••••••••" type="password" required/>
<button class="absolute right-5 text-on-surface-variant hover:text-on-surface transition-colors" type="button" onclick="togglePassword()">
<span class="material-symbols-outlined text-xl" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button id="btnLogin" class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-5 px-8 rounded-full flex items-center justify-between group hover:shadow-xl hover:shadow-primary/30 active:scale-95 transition-all duration-300" type="submit">
<span class="text-lg tracking-tight ml-2" id="btnText">Masuk</span>
<div class="w-10 h-10 bg-on-primary/10 rounded-full flex items-center justify-center group-hover:translate-x-1 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</div>
</form>
</div>
<!-- Background Card/Image Decoration (Subtle Glass) -->
<div class="fixed top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-[600px] h-[800px] opacity-10 hidden lg:block">
<img alt="modern smart home interior" class="w-full h-full object-cover rounded-[4rem]" data-alt="luxury modern apartment interior with minimalist furniture, ambient soft lighting, and architectural glass details in a deep navy mood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADHX2qAmRm9MWCgMOTAiCck18FhXuFgt5J3gSvAGP1gqQn3iNHiJ8kYYc_cXBGFF5XJhiWpw1HfAK6gTmS72njz2-P9-65Fu3mlPkCQMOus1XbnnxDDZa4OLuoHpCxwm30-7wcelZ-R5j_VQkbD0ybKGwm1kj1cs0-y_huUqy4jK_QowofIN8MHshhOw4jmRgGz7BU2dHi1V4KEpEAAfhE0Cw8yrXlpZhBWqqo2gHypcs_y3PPvSFv7LRlO3gIbxJ5ERxXLK44Fyn3"/>
</div>

<script>
    function togglePassword() {
        const pwdInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            eyeIcon.textContent = 'visibility_off';
        } else {
            pwdInput.type = 'password';
            eyeIcon.textContent = 'visibility';
        }
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCniLIgUlE3jM3WVQUk-AUR-_d9Q-2ctXc",
      authDomain: "smartkos-cb3ac.firebaseapp.com",
      databaseURL: "https://smartkos-cb3ac-default-rtdb.firebaseio.com",
      projectId: "smartkos-cb3ac",
      storageBucket: "smartkos-cb3ac.firebasestorage.app",
      messagingSenderId: "327501663967",
      appId: "1:327501663967:web:6a2ada9421a95d90faa36a",
      measurementId: "G-9J4B821KT8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const btnText = document.getElementById('btnText');
        const originalText = btnText.textContent;
        
        btnText.textContent = "Loading...";

        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                window.location.href = "index.html"; 
            })
            .catch((error) => {
                alert("Akses ditolak: " + error.message);
                btnText.textContent = originalText;
            });
    });
</script>
</body></html>
